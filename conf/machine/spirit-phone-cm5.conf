require conf/machine/raspberrypi5.conf

MACHINEOVERRIDES =. "spirit-phone-cm5:"

# The CM5 kernel repo uses bcm2712_defconfig
KBUILD_DEFCONFIG = "bcm2712_defconfig"

IMAGE_FSTYPES = "wic.bz2 wic.bmap"

# Take a look at https://git.yoctoproject.org/meta-raspberrypi/tree/docs/ipcompliance.md
LICENSE_FLAGS_ACCEPTED += "synaptics-killswitch"
